name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the repo. No job needs to write contents,
# packages, or deployments, so don't hand the token those scopes.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Throwaway Postgres for the integration tests. Unit tests don't need it, but
    # the *.integration.test.ts suites read DATABASE_URL and run when it's set.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openboard
          POSTGRES_PASSWORD: openboard
          POSTGRES_DB: openboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://openboard:openboard@localhost:5432/openboard_test
      SESSION_SECRET: ci-test-secret-not-for-production
      NODE_ENV: test

    steps:
      # Third-party actions are pinned to full commit SHAs (supply-chain: a moved
      # tag can't silently swap the action out). Version comments track the tag.
      # On current majors (checkout v5 / setup-node v5) to clear the Node-20
      # runtime deprecation.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 11

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm run typecheck

      - name: Check generated API client is in sync with the OpenAPI spec
        # The whole src trees (not just generated/) are checked so the
        # orval-maintained workspace barrels (src/index.ts) are covered too —
        # codegen must be a no-op on a clean checkout, with no manual fixups.
        run: |
          pnpm --filter @workspace/api-spec run codegen
          if [ -n "$(git status --porcelain -- lib/api-zod/src lib/api-client-react/src)" ]; then
            echo "::error::Generated API code is out of sync with openapi.yaml. Run 'pnpm --filter @workspace/api-spec run codegen' and commit the result."
            git status --porcelain -- lib/api-zod/src lib/api-client-react/src
            git --no-pager diff --stat -- lib/api-zod/src lib/api-client-react/src
            exit 1
          fi

      - name: Migrate the test database (fresh-DB path — what new adopters hit)
        run: pnpm --filter @workspace/db run migrate

      - name: Test (unit + integration)
        run: pnpm -r --if-present run test

      # "Stored, rendered, never consulted" shipped twice (quorum in 2.x,
      # deadlineBehavior in 3.x) — this makes the bug class mechanical: every
      # enum schema column must be consulted in a decision somewhere in server code.
      - name: Dead-config check
        run: node artifacts/api-server/scripts/check-dead-config.mjs

      - name: Build
        run: pnpm -r --if-present run build
