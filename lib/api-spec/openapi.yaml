    UpdateTaskBody:
      type: object
      properties:
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        assigneeId:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
          enum: [todo, in_progress, done, blocked, evidence_submitted, pending_review, overdue, cancelled, null]
          description: >
            cancelled is terminal (the task becomes immutable; cancel, not
            delete). A done task is content-immutable; the only legal move out
            of done is a pure reopen to todo/in_progress.
