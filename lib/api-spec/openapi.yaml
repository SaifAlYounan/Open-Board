        boardId:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        assigneeId:
          type: ["string", "null"]
        taskNumber:
          type: ["string", "null"]
        status:
          type: string
          enum: [todo, in_progress, evidence_submitted, pending_review, done, blocked, overdue, cancelled]
        dueDate:
          type: ["string", "null"]
        aiExtracted:
