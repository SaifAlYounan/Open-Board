        sourceParagraph:
          type: ["string", "null"]
        sourceMeetingId:
          type: ["string", "null"]
        sourceMinutesId:
          type: ["string", "null"]
        assignee:
          $ref: "#/components/schemas/Person"
        sourceMeetingTitle:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - title
        - status
        - aiExtracted
        - createdAt

    TaskDetail:
      type: object
      properties:
        id:
          type: string
        boardId:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        assigneeId:
          type: ["string", "null"]
        taskNumber:
          type: ["string", "null"]
        status:
          type: string
        dueDate:
          type: ["string", "null"]
        aiExtracted:
          type: boolean
        sourceParagraph:
          type: ["string", "null"]
        sourceMeetingId:
          type: ["string", "null"]
        sourceMinutesId:
          type: ["string", "null"]
        assignee:
          $ref: "#/components/schemas/Person"
        sourceMeetingTitle:
          type: ["string", "null"]
        evidence:
          type: array
          items:
