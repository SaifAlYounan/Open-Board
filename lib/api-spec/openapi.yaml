openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LQGovernance — Board Management Portal API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: people
    description: User management
  - name: boards
    description: Board management
  - name: meetings
    description: Meeting management
  - name: votes
    description: Vote management
  - name: minutes
    description: Minutes management
  - name: documents
    description: Document management
  - name: tasks
    description: Task management
  - name: pending-actions
    description: AI pending actions queue
  - name: ai
    description: AI features
  - name: dashboard
    description: Dashboard aggregates
  - name: audit
    description: Audit trail
  - name: graph
    description: Governance graph and search
  - name: workflows
    description: Multi-stage approval workflows
  - name: system
    description: Organization identity, export, and reset

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  # Dashboard
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary for current user
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/ai-insights:
    get:
      operationId: getDashboardAiInsights
      tags: [dashboard]
      summary: Get AI-generated dashboard insights for current user
      responses:
        "200":
          description: AI insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiInsightsResponse"

  # People
  /people:
    get:
      operationId: listPeople
      tags: [people]
      summary: List all people
      responses:
        "200":
          description: List of people
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Person"
    post:
      operationId: createPerson
      tags: [people]
      summary: Create a new person
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePersonBody"
      responses:
        "201":
          description: Created person
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"

  /people/{id}:
    get:
      operationId: getPerson
      tags: [people]
      summary: Get a person by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Person
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
    patch:
      operationId: updatePerson
      tags: [people]
      summary: Update a person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePersonBody"
      responses:
        "200":
          description: Updated person
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
    delete:
      operationId: deletePerson
      tags: [people]
      summary: Delete a person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # Boards
  /boards:
    get:
      operationId: listBoards
      tags: [boards]
      summary: List boards accessible to current user
      responses:
        "200":
          description: List of boards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Board"
    post:
      operationId: createBoard
      tags: [boards]
      summary: Create a new board
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBoardBody"
      responses:
        "201":
          description: Created board
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"

  /boards/{id}:
    get:
      operationId: getBoard
      tags: [boards]
      summary: Get a board by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Board with members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardWithMembers"
    patch:
      operationId: updateBoard
      tags: [boards]
      summary: Update board settings (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBoardBody"
      responses:
        "200":
          description: Updated board
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"

  /boards/{id}/members:
    get:
      operationId: getBoardMembers
      tags: [boards]
      summary: Get members of a board
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Board members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BoardMember"
    post:
      operationId: addBoardMember
      tags: [boards]
      summary: Add a member to a board
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddBoardMemberBody"
      responses:
        "201":
          description: Member added

  /boards/{id}/members/{personId}:
    patch:
      operationId: updateBoardMember
      tags: [boards]
      summary: Update a board member's role and/or voting weight (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: personId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBoardMemberBody"
      responses:
        "200":
          description: Member updated
    delete:
      operationId: removeBoardMember
      tags: [boards]
      summary: Remove a member from a board (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: personId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Member removed

  # Meetings
  /meetings:
    get:
      operationId: listMeetings
      tags: [meetings]
      summary: List meetings accessible to current user
      parameters:
        - name: boardId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of meetings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meeting"
    post:
      operationId: createMeeting
      tags: [meetings]
      summary: Create a meeting (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeetingBody"
      responses:
        "201":
          description: Created meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"

  /meetings/{id}:
    get:
      operationId: getMeeting
      tags: [meetings]
      summary: Get a meeting by ID with agenda
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Meeting with agenda
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingDetail"
    patch:
      operationId: updateMeeting
      tags: [meetings]
      summary: Update a meeting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeetingBody"
      responses:
        "200":
          description: Updated meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"
        "409":
          description: Illegal state transition or edit of a non-scheduled/cancelled meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMeeting
      tags: [meetings]
      summary: Delete a meeting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /meetings/{id}/attendance:
    get:
      operationId: getMeetingAttendance
      tags: [meetings]
      summary: Get attendance for a meeting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attendance list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    patch:
      operationId: updateAttendance
      tags: [meetings]
      summary: Update attendance status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAttendanceBody"
      responses:
        "200":
          description: Updated attendance

  # Votes
  /votes:
    get:
      operationId: listVotes
      tags: [votes]
      summary: List votes accessible to current user
      parameters:
        - name: boardId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of votes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vote"
    post:
      operationId: createVote
      tags: [votes]
      summary: Create a vote (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoteBody"
      responses:
        "201":
          description: Created vote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vote"

  /votes/{id}:
    get:
      operationId: getVote
      tags: [votes]
      summary: Get a vote by ID with vote records
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vote detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteDetail"
    patch:
      operationId: updateVote
      tags: [votes]
      summary: Update a vote (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVoteBody"
      responses:
        "200":
          description: Updated vote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vote"
        "409":
          description: The vote is closed — closed votes are immutable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteVote
      tags: [votes]
      summary: Delete a vote (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /votes/{id}/cast:
    post:
      operationId: castVote
      tags: [votes]
      summary: Cast a vote (member only, once per vote)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CastVoteBody"
      responses:
        "200":
          description: Vote cast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteRecord"
        "409":
          description: Already voted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /votes/{id}/proxies:
    post:
      operationId: grantVoteProxy
      tags: [votes]
      summary: Record a per-vote proxy grant (admin only) — holder may cast on behalf of the principal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantVoteProxyBody"
      responses:
        "201":
          description: Proxy grant recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteProxy"
        "409":
          description: Grant violates a proxy rule (already voted, already granted, holder at limit, recused…)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /votes/{id}/proxies/{proxyId}:
    delete:
      operationId: revokeVoteProxy
      tags: [votes]
      summary: Revoke an unused proxy grant while the vote is open (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: proxyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Proxy grant revoked
        "409":
          description: Proxy already used or vote no longer open
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /votes/{id}/certificate:
    get:
      operationId: getVoteCertificate
      tags: [votes]
      summary: Get vote certificate HTML
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Certificate data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteCertificate"

  # Minutes
  /minutes:
    get:
      operationId: listMinutes
      tags: [minutes]
      summary: List minutes accessible to current user
      parameters:
        - name: boardId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of minutes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Minutes"
    post:
      operationId: createMinutes
      tags: [minutes]
      summary: Create minutes (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMinutesBody"
      responses:
        "201":
          description: Created minutes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Minutes"

  /minutes/{id}:
    get:
      operationId: getMinutes
      tags: [minutes]
      summary: Get minutes by ID with content, comments, signatures
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Minutes detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinutesDetail"
    patch:
      operationId: updateMinutes
      tags: [minutes]
      summary: Update minutes content (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMinutesBody"
      responses:
        "200":
          description: Updated minutes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Minutes"

  /minutes/{id}/status:
    patch:
      operationId: updateMinutesStatus
      tags: [minutes]
      summary: Advance minutes workflow status (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMinutesStatusBody"
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Minutes"

  /minutes/{id}/sign:
    post:
      operationId: signMinutes
      tags: [minutes]
      summary: Sign minutes (member only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinutesSignature"

  /minutes/{id}/comments:
    get:
      operationId: getMinutesComments
      tags: [minutes]
      summary: Get comments on minutes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MinutesComment"
    post:
      operationId: addMinutesComment
      tags: [minutes]
      summary: Add a comment to minutes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMinutesCommentBody"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinutesComment"

  /minutes/{id}/comments/{commentId}:
    patch:
      operationId: resolveMinutesComment
      tags: [minutes]
      summary: Resolve a comment (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveCommentBody"
      responses:
        "200":
          description: Comment resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinutesComment"

  # Documents
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents accessible to current user
      parameters:
        - name: boardId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /documents/{id}/reclassify:
    post:
      operationId: reclassifyDocument
      tags: [documents]
      summary: Retry AI classification for a document (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Classification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  # Tasks
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks accessible to current user
      parameters:
        - name: boardId
          in: query
          required: false
          schema:
            type: string
        - name: assigneeId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID with evidence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDetail"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "409":
          description: The task is in a terminal state (done/cancelled) — edit not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /tasks/{id}/evidence/review:
    post:
      operationId: reviewTaskEvidence
      tags: [tasks]
      summary: Secretary confirms or rejects AI-approved evidence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewEvidenceBody"
      responses:
        "200":
          description: Evidence review saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEvidence"

  # Pending Actions (AI queue)
  /pending-actions:
    get:
      operationId: listPendingActions
      tags: [pending-actions]
      summary: List pending AI actions (admin only)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of pending actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendingAction"

  /pending-actions/{id}/approve:
    post:
      operationId: approvePendingAction
      tags: [pending-actions]
      summary: Approve a pending AI action (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveActionBody"
      responses:
        "200":
          description: Action approved and entity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveActionResponse"

  /pending-actions/{id}/reject:
    post:
      operationId: rejectPendingAction
      tags: [pending-actions]
      summary: Reject a pending AI action (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectActionBody"
      responses:
        "200":
          description: Action rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingAction"

  # AI endpoints
  /ai/command:
    post:
      operationId: aiCommand
      tags: [ai]
      summary: Execute a natural language command (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiCommandBody"
      responses:
        "200":
          description: Command processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCommandResponse"

  /ai/search:
    post:
      operationId: aiSearch
      tags: [ai]
      summary: Natural language search across board data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSearchBody"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSearchResponse"

  /ai/status:
    get:
      operationId: getAiStatus
      tags: [ai]
      summary: Check if AI features are configured
      responses:
        "200":
          description: AI status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiStatusResponse"


  # ── Auth (self-service) ──
  /auth/refresh:
    get:
      operationId: refreshToken
      tags: [auth]
      summary: Re-issue the session cookie for the authenticated user
      responses:
        "200":
          description: Fresh token set as an HttpOnly cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password-reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordBody"
      responses:
        "200":
          description: Uniform response, whether or not the email is registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Set a new password with a reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordBody"
      responses:
        "200":
          description: Password reset; all previously issued tokens are revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or expired token, or password too short
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change the authenticated user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed; a fresh session cookie is issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Audit trail (admin) ──
  /audit:
    get:
      operationId: listAuditEntries
      tags: [audit]
      summary: List audit-trail entries (admin only)
      parameters:
        - name: personId
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Audit entries, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"

  /audit/people:
    get:
      operationId: listAuditPeople
      tags: [audit]
      summary: List people for the audit filter dropdown (admin only)
      responses:
        "200":
          description: People
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditPerson"

  # ── Documents: upload / download / per-person access ──
  /documents/upload:
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a document (PDF, DOCX, or TXT; max 10 MB) — AI classification runs in the background
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadFileBody"
      responses:
        "200":
          description: Stored document; `classifying` says whether AI classification was queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadDocumentResponse"
        "400":
          description: Missing file, disallowed type, or too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/download:
    get:
      operationId: downloadDocument
      tags: [documents]
      summary: Download the original file (requires access to the document)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The file, as an attachment
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /documents/{id}/access:
    get:
      operationId: getDocumentAccess
      tags: [documents]
      summary: List per-person access for a document (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Access entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentAccessEntry"
    patch:
      operationId: updateDocumentAccess
      tags: [documents]
      summary: Grant or revoke one person's access to a document (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentAccessBody"
      responses:
        "200":
          description: Updated access entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDocumentAccessResponse"
        "404":
          description: Document, or access record for that person, not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Governance graph ──
  /graph:
    get:
      operationId: getGraph
      tags: [graph]
      summary: Get the governance graph for the user's accessible boards
      parameters:
        - name: boardId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Nodes and deduplicated edges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphResponse"

  /graph/summary:
    get:
      operationId: getGraphSummary
      tags: [graph]
      summary: Aggregate governance statistics, project rollups, and vote timeline
      parameters:
        - name: boardId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphSummary"

  /graph/search:
    get:
      operationId: searchGraph
      tags: [graph]
      summary: Search entities and return matches with a 1-hop neighborhood graph
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: boardId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Matches plus surrounding graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphSearchResponse"

  # ── Meetings: agenda item CRUD ──
  /meetings/{id}/agenda:
    post:
      operationId: addAgendaItem
      tags: [meetings]
      summary: Append an agenda item to a meeting (admin only; position is assigned server-side)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddAgendaItemBody"
      responses:
        "201":
          description: Created agenda item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgendaItem"
        "409":
          description: The meeting is cancelled and immutable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /meetings/{id}/agenda/{itemId}:
    patch:
      operationId: updateAgendaItem
      tags: [meetings]
      summary: Update an agenda item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgendaItemBody"
      responses:
        "200":
          description: Updated agenda item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgendaItem"
        "404":
          description: Agenda item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAgendaItem
      tags: [meetings]
      summary: Delete an agenda item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Tasks: evidence submission ──
  /tasks/{id}/evidence:
    post:
      operationId: submitTaskEvidence
      tags: [tasks]
      summary: Submit evidence for a task (assignee or admin) — AI pre-review runs when configured
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadFileBody"
      responses:
        "200":
          description: Stored evidence, including any AI verdict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEvidence"
        "403":
          description: Only the assignee (or an admin) may submit evidence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Votes: certificate verification and supporting documents ──
  /votes/{id}/certificate/verify:
    get:
      operationId: verifyVoteCertificate
      tags: [votes]
      summary: Recompute and verify the tamper-evidence hash of a closed vote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification result (hashVersion 2 = weighted/proxy era, 1 = legacy)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateVerification"

  /votes/{id}/documents:
    get:
      operationId: listVoteDocuments
      tags: [votes]
      summary: List supporting documents attached to a vote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Supporting documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VoteDocument"
    post:
      operationId: uploadVoteDocument
      tags: [votes]
      summary: Attach a supporting document to a vote (requires access to the vote)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadVoteDocumentBody"
      responses:
        "201":
          description: Stored supporting document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteDocument"

  /votes/{id}/documents/{docId}:
    delete:
      operationId: deleteVoteDocument
      tags: [votes]
      summary: Delete a supporting document (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: docId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /votes/{id}/documents/{docId}/download:
    get:
      operationId: downloadVoteDocument
      tags: [votes]
      summary: Download a supporting document (requires access to the vote)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: docId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The file, as an attachment
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # ── Approval workflows (admin) ──
  /workflows:
    get:
      operationId: listWorkflows
      tags: [workflows]
      summary: List approval workflows with their stages (admin only)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Workflows with stages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workflow"

  /workflows/{id}:
    get:
      operationId: getWorkflow
      tags: [workflows]
      summary: Get one workflow with per-stage vote details (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDetail"
        "404":
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── System: identity, export, reset ──
  /organization:
    get:
      operationId: getOrganization
      tags: [system]
      summary: Get the organization's display identity
      responses:
        "200":
          description: Organization name and app version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationInfo"

  /system/export:
    get:
      operationId: exportSystemData
      tags: [system]
      summary: Export the complete governance dataset as one JSON bundle (admin only; no password hashes)
      responses:
        "200":
          description: JSON export, served as an attachment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemExportBundle"

  /system/reset-data:
    post:
      operationId: resetSystemData
      tags: [system]
      summary: Delete all transactional data (admin only; requires confirm token and the admin's password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetDataBody"
      responses:
        "200":
          description: Data cleared (organization, people, and boards preserved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetDataResponse"
        "403":
          description: Admin password incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # Auth
    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/Person"
      required:
        - token
        - user

    # Person
    Person:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, member, observer, management]
        title:
          type: ["string", "null"]
        avatarColor:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - email
        - name
        - role
        - createdAt

    CreatePersonBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, member, observer, management]
        title:
          type: ["string", "null"]
        avatarColor:
          type: ["string", "null"]
      required:
        - email
        - password
        - name
        - role

    UpdatePersonBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        title:
          type: ["string", "null"]
        avatarColor:
          type: ["string", "null"]
        role:
          type: ["string", "null"]

    # Board
    Board:
      type: object
      properties:
        id:
          type: string
        organizationId:
          type: ["string", "null"]
        name:
          type: string
        abbreviation:
          type: ["string", "null"]
        type:
          type: string
          enum: [board, committee]
        proxyLimit:
          type: integer
          description: Max proxies one member may hold on a single vote (0 disables proxy voting).
        memberCount:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - name
        - type
        - proxyLimit
        - memberCount
        - createdAt

    BoardWithMembers:
      type: object
      properties:
        id:
          type: string
        organizationId:
          type: ["string", "null"]
        name:
          type: string
        abbreviation:
          type: ["string", "null"]
        type:
          type: string
        proxyLimit:
          type: integer
        members:
          type: array
          items:
            $ref: "#/components/schemas/BoardMember"
        createdAt:
          type: string
      required:
        - id
        - name
        - type
        - proxyLimit
        - members
        - createdAt

    BoardMember:
      type: object
      properties:
        id:
          type: string
        personId:
          type: string
        boardId:
          type: string
        roleInBoard:
          type: ["string", "null"]
        votingWeight:
          type: integer
          description: Voting weight of this member on this board (positive integer, default 1).
        person:
          $ref: "#/components/schemas/Person"
      required:
        - id
        - personId
        - boardId
        - votingWeight
        - person

    CreateBoardBody:
      type: object
      properties:
        name:
          type: string
        abbreviation:
          type: ["string", "null"]
        type:
          type: string
          enum: [board, committee]
      required:
        - name
        - type

    UpdateBoardBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        proxyLimit:
          type: ["integer", "null"]
          description: Max proxies one member may hold on a single vote (0 disables proxy voting).

    AddBoardMemberBody:
      type: object
      properties:
        personId:
          type: string
        roleInBoard:
          type: ["string", "null"]
        votingWeight:
          type: ["integer", "null"]
          description: Voting weight (positive integer). Defaults to 1.
      required:
        - personId

    UpdateBoardMemberBody:
      type: object
      properties:
        roleInBoard:
          type: ["string", "null"]
        votingWeight:
          type: ["integer", "null"]
          description: New voting weight (positive integer). Already-cast ballots keep their snapshotted weight.

    # Meeting
    Meeting:
      type: object
      properties:
        id:
          type: string
        boardId:
          type: string
        title:
          type: string
        date:
          type: string
        location:
          type: ["string", "null"]
        status:
          type: string
          enum: [scheduled, concluded, cancelled]
        boardName:
          type: ["string", "null"]
        boardAbbreviation:
          type: ["string", "null"]
        agendaItemCount:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - boardId
        - title
        - date
        - status
        - agendaItemCount
        - createdAt

    MeetingDetail:
      type: object
      properties:
        id:
          type: string
        boardId:
          type: string
        title:
          type: string
        date:
          type: string
        location:
          type: ["string", "null"]
        status:
          type: string
        boardName:
          type: ["string", "null"]
        boardAbbreviation:
          type: ["string", "null"]
        agendaItems:
          type: array
          items:
            $ref: "#/components/schemas/AgendaItem"
        attendance:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRecord"
        createdAt:
          type: string
      required:
        - id
        - boardId
        - title
        - date
        - status
        - agendaItems
        - attendance
        - createdAt

    AgendaItem:
      type: object
      properties:
        id:
          type: string
        meetingId:
          type: string
        position:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [information, discussion, decision]
        description:
          type: ["string", "null"]
        voteId:
          type: ["string", "null"]
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
      required:
        - id
        - meetingId
        - position
        - title
        - type
        - documents

    AttendanceRecord:
      type: object
      properties:
        personId:
          type: string
        meetingId:
          type: string
        status:
          type: string
          enum: [confirmed, pending, proxy, absent]
        proxyHolderId:
          type: ["string", "null"]
        person:
          $ref: "#/components/schemas/Person"
      required:
        - personId
        - meetingId
        - status
        - person

    CreateMeetingBody:
      type: object
      properties:
        boardId:
          type: string
        title:
          type: string
        date:
          type: string
        location:
          type: ["string", "null"]
        agendaItems:
          type: array
          items:
            $ref: "#/components/schemas/CreateAgendaItemBody"
      required:
        - boardId
        - title
        - date

    CreateAgendaItemBody:
      type: object
      properties:
        position:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [information, discussion, decision]
        description:
          type: ["string", "null"]
      required:
        - position
        - title
        - type

    UpdateMeetingBody:
      type: object
      properties:
        title:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
          enum: [scheduled, concluded, cancelled, null]
          description: >
            Legal transitions: scheduled → concluded|cancelled, concluded →
            scheduled (reopen). cancelled is terminal — the record is kept
            (cancel, not delete). Content edits require a scheduled meeting.

    UpdateAttendanceBody:
      type: object
      properties:
        updates:
          type: array
          items:
            type: object
            properties:
              personId:
                type: string
              status:
                type: string
                enum: [confirmed, pending, proxy, absent]
              proxyHolderId:
                type: ["string", "null"]
            required:
              - personId
              - status
      required:
        - updates

    # Vote
    Vote:
      type: object
      properties:
        id:
          type: string
        boardId:
          type: string
        meetingId:
          type: ["string", "null"]
        resolutionNumber:
          type: string
        title:
          type: string
        resolutionText:
          type: string
        type:
          type: string
          enum: [meeting, circulation]
        deadline:
          type: ["string", "null"]
        status:
          type: string
          enum: [open, approved, rejected, lapsed, cancelled]
        boardName:
          type: ["string", "null"]
        boardAbbreviation:
          type: ["string", "null"]
        totalVoters:
          type: integer
        votescast:
          type: integer
        approvalsCount:
          type: integer
        totalWeight:
          type: integer
          description: Summed voting weight of eligible (non-recused) voting members.
        castWeight:
          type: integer
          description: Summed voting weight of valid ballots cast.
        approvalsWeight:
          type: integer
          description: Summed voting weight of valid "approved" ballots.
        hasVoted:
          type: boolean
        myProxies:
          type: array
          description: Proxy grants the current user holds on this vote.
          items:
            $ref: "#/components/schemas/MyVoteProxy"
        createdAt:
          type: string
      required:
        - id
        - boardId
        - resolutionNumber
        - title
        - resolutionText
        - type
        - status
        - totalVoters
        - votescast
        - approvalsCount
        - totalWeight
        - castWeight
        - approvalsWeight
        - hasVoted
        - createdAt

    VoteDetail:
      type: object
      properties:
        id:
          type: string
        boardId:
          type: string
        meetingId:
          type: ["string", "null"]
        resolutionNumber:
          type: string
        title:
          type: string
        resolutionText:
          type: string
        type:
          type: string
        deadline:
          type: ["string", "null"]
        status:
          type: string
        boardName:
          type: ["string", "null"]
        totalVoters:
          type: integer
        votescast:
          type: integer
        approvalsCount:
          type: integer
        totalWeight:
          type: integer
        castWeight:
          type: integer
        approvalsWeight:
          type: integer
        hasVoted:
          type: boolean
        myVote:
          $ref: "#/components/schemas/VoteRecord"
        voteRecords:
          type: array
          items:
            $ref: "#/components/schemas/VoteRecord"
        proxies:
          type: array
          description: Proxy grants recorded for this vote (administrative facts, visible to anyone with vote access).
          items:
            $ref: "#/components/schemas/VoteProxy"
        myProxies:
          type: array
          description: Proxy grants the current user holds on this vote.
          items:
            $ref: "#/components/schemas/MyVoteProxy"
        approvalRule:
          $ref: "#/components/schemas/ApprovalRule"
        certificateHash:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - boardId
        - resolutionNumber
        - title
        - resolutionText
        - type
        - status
        - totalVoters
        - votescast
        - approvalsCount
        - totalWeight
        - castWeight
        - approvalsWeight
        - hasVoted
        - voteRecords
        - createdAt

    VoteRecord:
      type: object
      properties:
        id:
          type: string
        voteId:
          type: string
        personId:
          type: string
        decision:
          type: string
          enum: [approved, approved_with_comments, not_approved, not_approved_with_comments]
        comment:
          type: ["string", "null"]
        weight:
          type: integer
          description: Voting weight snapshotted when the ballot was cast.
        castBy:
          type: ["string", "null"]
          description: Person who cast this ballot as proxy for `personId` (null = cast in person).
        castByName:
          type: ["string", "null"]
        votedAt:
          type: string
        person:
          $ref: "#/components/schemas/Person"
      required:
        - id
        - voteId
        - personId
        - decision
        - weight
        - votedAt
        - person

    VoteProxy:
      type: object
      properties:
        id:
          type: string
        voteId:
          type: string
        principalId:
          type: string
        holderId:
          type: string
        principalName:
          type: ["string", "null"]
        holderName:
          type: ["string", "null"]
        used:
          type: boolean
          description: True once the holder has cast the principal's ballot.
        createdAt:
          type: string
      required:
        - id
        - voteId
        - principalId
        - holderId
        - used
        - createdAt

    MyVoteProxy:
      type: object
      properties:
        proxyId:
          type: string
        principalId:
          type: string
        principalName:
          type: ["string", "null"]
        hasVoted:
          type: boolean
          description: True once a ballot exists for the principal (own or proxy-cast).
      required:
        - proxyId
        - principalId
        - hasVoted

    GrantVoteProxyBody:
      type: object
      properties:
        principalId:
          type: string
          description: The absent member whose ballot will be cast by proxy.
        holderId:
          type: string
          description: The member who will cast on the principal's behalf.
      required:
        - principalId
        - holderId

    ApprovalRule:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [unanimous, majority, two_thirds, three_quarters, custom]
        minApprovals:
          type: ["integer", "null"]
        quorum:
          type: ["integer", "null"]
        weighted:
          type: boolean
        deadlineBehavior:
          type: string
        summaryText:
          type: string
      required:
        - id
        - type
        - weighted
        - deadlineBehavior
        - summaryText

    VoteCertificate:
      type: object
      properties:
        voteId:
          type: string
        resolutionNumber:
          type: string
        title:
          type: string
        status:
          type: string
        boardName:
          type: string
        closedAt:
          type: ["string", "null"]
        hash:
          type: ["string", "null"]
        totalWeight:
          type: integer
        castWeight:
          type: integer
        approvalsWeight:
          type: integer
        voteRecords:
          type: array
          items:
            $ref: "#/components/schemas/VoteRecord"
        proxies:
          type: array
          description: Proxy relationships (disclosed for open ballots; withheld with the records on secret ballots).
          items:
            $ref: "#/components/schemas/VoteProxy"
      required:
        - voteId
        - resolutionNumber
        - title
        - status
        - boardName
        - totalWeight
        - castWeight
        - approvalsWeight
        - voteRecords
        - proxies

    CreateVoteBody:
      type: object
      properties:
        boardId:
          type: string
        meetingId:
          type: ["string", "null"]
        resolutionNumber:
          type: string
        title:
          type: string
        resolutionText:
          type: string
        type:
          type: string
          enum: [meeting, circulation]
        deadline:
          type: ["string", "null"]
        approvalRule:
          $ref: "#/components/schemas/CreateApprovalRuleBody"
      required:
        - boardId
        - resolutionNumber
        - title
        - resolutionText
        - type

    CreateApprovalRuleBody:
      type: object
      properties:
        type:
          type: string
          enum: [unanimous, majority, two_thirds, three_quarters, custom]
        minApprovals:
          type: ["integer", "null"]
        quorum:
          type: ["integer", "null"]
        weighted:
          type: boolean
        deadlineBehavior:
          type: string
          enum: [lapse, extend, notify]
        requiredVoterIds:
          type: array
          items:
            type: string
        recusedIds:
          type: array
          items:
            type: string
      required:
        - type

    UpdateVoteBody:
      type: object
      properties:
        title:
          type: ["string", "null"]
        resolutionText:
          type: ["string", "null"]
        deadline:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
          enum: [open, lapsed, cancelled, null]
          description: >
            approved/rejected are OUTCOMES set only by the evaluation path
            (403 if forced). A closed vote is immutable (409); an open vote may
            be lapsed or cancelled — cancel keeps the full record and audit
            trail.
        secret:
          type: ["boolean", "null"]

    CastVoteBody:
      type: object
      properties:
        decision:
          type: string
          enum: [approved, approved_with_comments, not_approved, not_approved_with_comments]
        comment:
          type: ["string", "null"]
        onBehalfOf:
          type: ["string", "null"]
          description: >
            Person id of the PRINCIPAL when casting as their proxy holder. The
            ballot is recorded against the principal with the holder attributed
            (never masqueraded). Requires a recorded proxy grant for this vote.
      required:
        - decision

    # Minutes
    Minutes:
      type: object
      properties:
        id:
          type: string
        meetingId:
          type: string
        status:
          type: string
          enum: [draft, review, signing, signed]
        meetingTitle:
          type: ["string", "null"]
        meetingDate:
          type: ["string", "null"]
        boardName:
          type: ["string", "null"]
        signatureCount:
          type: integer
        commentCount:
          type: integer
        hasSigned:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - meetingId
        - status
        - signatureCount
        - commentCount
        - hasSigned
        - createdAt
        - updatedAt

    MinutesDetail:
      type: object
      properties:
        id:
          type: string
        meetingId:
          type: string
        content:
          type: string
        status:
          type: string
        meetingTitle:
          type: ["string", "null"]
        meetingDate:
          type: ["string", "null"]
        boardName:
          type: ["string", "null"]
        signatures:
          type: array
          items:
            $ref: "#/components/schemas/MinutesSignature"
        comments:
          type: array
          items:
            $ref: "#/components/schemas/MinutesComment"
        hasSigned:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - meetingId
        - content
        - status
        - signatures
        - comments
        - hasSigned
        - createdAt
        - updatedAt

    MinutesSignature:
      type: object
      properties:
        id:
          type: string
        minutesId:
          type: string
        personId:
          type: string
        signatureHash:
          type: string
        signedAt:
          type: string
        person:
          $ref: "#/components/schemas/Person"
      required:
        - id
        - minutesId
        - personId
        - signatureHash
        - signedAt
        - person

    MinutesComment:
      type: object
      properties:
        id:
          type: string
        minutesId:
          type: string
        personId:
          type: string
        originalText:
          type: string
        commentText:
          type: string
        status:
          type: string
          enum: [pending, resolved]
        color:
          type: string
        createdAt:
          type: string
        person:
          $ref: "#/components/schemas/Person"
      required:
        - id
        - minutesId
        - personId
        - originalText
        - commentText
        - status
        - color
        - createdAt
        - person

    CreateMinutesBody:
      type: object
      properties:
        meetingId:
          type: string
        content:
          type: string
      required:
        - meetingId
        - content

    UpdateMinutesBody:
      type: object
      properties:
