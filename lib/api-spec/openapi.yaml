        aiReasoning:
          type: ["string", "null"]
        aiMissing:
          type: ["object", "null"]
        secretaryDecision:
          type: ["string", "null"]
          enum: [confirmed, rejected, pending, null]
        secretaryComment:
          type: ["string", "null"]
        submittedAt:
          type: string
        reviewedAt:
          type: ["string", "null"]
        submitter:
          $ref: "#/components/schemas/Person"
      required:
        - id
        - taskId
        - submittedAt
        - submitter

    CreateTaskBody:
      type: object
      properties:
        boardId:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        assigneeId:
          type: ["string", "null"]
        sourceMeetingId:
          type: ["string", "null"]
        sourceMinutesId:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
        sourceParagraph:
          type: ["string", "null"]
      required:
