        title:
          type: string
        filename:
          type: string
        fileSize:
          type: ["integer", "null"]
        mimeType:
          type: ["string", "null"]
        aiClassification:
          type: ["object", "null"]
        uploadedBy:
          type: ["string", "null"]
        uploaderName:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
