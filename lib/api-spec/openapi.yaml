    # ── Graph ──
    GraphNode:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [board, person, vote, meeting, minutes, document, task]
        label:
          type: string
        status:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
        boardId:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
      required:
        - id
        - type
        - label

    GraphEdge:
      type: object
      properties:
        source:
          type: string
        target:
          type: string
        relationship:
          type: string
      required:
        - source
        - target
        - relationship

    GraphResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"
      required:
        - nodes
        - edges

    GraphSummary:
      type: object
      description: Aggregate counters per entity family, keyword-derived project rollups, and a chronological vote timeline.
      properties:
        votes:
          type: object
          additionalProperties: true
        meetings:
          type: object
          additionalProperties: true
        documents:
          type: object
          additionalProperties: true
        tasks:
          type: object
          additionalProperties: true
        minutes:
          type: object
          additionalProperties: true
        people:
          type: object
          additionalProperties: true
        projects:
          type: array
          items:
            type: object
            additionalProperties: true
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/GraphTimelineEntry"
      required:
        - votes
        - meetings
        - documents
        - tasks
        - minutes
        - people
        - projects
        - timeline

    GraphTimelineEntry:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
        board:
          type: string
        resolutionNumber:
          type: ["string", "null"]
      required:
        - id
        - title
        - board

    GraphSearchResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        summary:
          type: string
      required:
        - nodes
        - edges
        - matches
        - summary

    # ── Agenda items ──
    UpdateAgendaItemBody:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [information, discussion, decision]
        description:
          type: string

    AddAgendaItemBody:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [information, discussion, decision]
        description:
          type: string
      required:
        - title
        - type

    # ── Vote certificates and documents ──
    CertificateVerification:
      type: object
      properties:
        verified:
          type: boolean
        reason:
          type: string
          description: Present when verification was not possible (e.g. not_finalized).
        storedHash:
          type: string
        recomputedHash:
          type: string
        hashVersion:
          type: ["integer", "null"]
          description: 2 = weighted/proxy hash, 1 = legacy pre-weighted hash, null = mismatch.
      required:
        - verified

    VoteDocument:
      type: object
      properties:
        id:
          type: string
        voteId:
          type: string
        title:
          type: ["string", "null"]
        filename:
          type: string
        fileSize:
          type: ["integer", "null"]
        mimeType:
          type: ["string", "null"]
        uploadedBy:
          type: ["string", "null"]
        uploaderName:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - voteId
        - filename
        - createdAt

    # ── Workflows ──
    Workflow:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
        boardId:
          type: ["string", "null"]
        sourceDocumentId:
          type: ["string", "null"]
        createdAt:
          type: string
        stages:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowStage"
      required:
        - id
        - title
        - status
        - createdAt
        - stages

    WorkflowStage:
      type: object
      properties:
        id:
          type: string
        workflowId:
          type: string
        stageIndex:
          type: integer
        stageGroup:
          type: integer
        title:
          type: ["string", "null"]
        status:
          type: string
        boardId:
          type: ["string", "null"]
        boardName:
          type: ["string", "null"]
        boardAbbreviation:
          type: ["string", "null"]
        approvalType:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        voteId:
          type: ["string", "null"]
      required:
        - id
        - workflowId
        - stageIndex
        - status

    WorkflowDetail:
      allOf:
        - $ref: "#/components/schemas/Workflow"
        - type: object
          properties:
            boardName:
              type: ["string", "null"]
            stages:
              type: array
              items:
                $ref: "#/components/schemas/WorkflowStageDetail"

    WorkflowStageDetail:
      allOf:
        - $ref: "#/components/schemas/WorkflowStage"
        - type: object
          properties:
            vote:
              oneOf:
                - $ref: "#/components/schemas/Vote"
                - type: "null"
            voteStats:
              oneOf:
                - $ref: "#/components/schemas/WorkflowVoteStats"
                - type: "null"

    WorkflowVoteStats:
      type: object
      properties:
        totalVoters:
          type: integer
        votesCast:
          type: integer
        approvalsCount:
          type: integer
      required:
        - totalVoters
        - votesCast
        - approvalsCount

    # ── System ──
    OrganizationInfo:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
      required:
        - name
        - version

    SystemExportBundle:
      type: object
      description: One JSON bundle containing every governance table (people without password hashes).
      additionalProperties: true
      properties:
        exportedAt:
          type: string
        schemaVersion:
          type: string
      required:
        - exportedAt
        - schemaVersion

    ResetDataBody:
      type: object
      properties:
        confirm:
          type: string
          description: Must be the literal string RESET.
        password:
          type: string
          description: The requesting admin's own password, re-verified server-side.
      required:
        - confirm
        - password

    ResetDataResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
      required:
        - ok
        - message
