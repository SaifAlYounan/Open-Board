# LQGovernance — turnkey deployment.
#
#   Local (http on a port):
#     cp .env.example .env   # set SESSION_SECRET (openssl rand -hex 32)
#     docker compose up -d           # → http://localhost:3000
#
#   Production (automatic HTTPS for your domain):
#     in .env set: SESSION_SECRET, NODE_ENV=production, DOMAIN=board.example.com,
#                  ACME_EMAIL=you@example.com, ALLOWED_ORIGIN=https://board.example.com
#     docker compose --profile production up -d   # → https://board.example.com
#
#   Dev database only (for `pnpm dev`):
#     docker compose up -d db
name: open-board

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: openboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openboard}
      POSTGRES_DB: openboard
    volumes:
      - db-data:/var/lib/postgresql/data
    # Published on loopback only for the `pnpm dev` flow — never expose Postgres
    # to the network. The default password is dev-grade; binding to 127.0.0.1
    # keeps it off any public interface (H1).
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: open-board:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://openboard:${POSTGRES_PASSWORD:-openboard}@db:5432/openboard
      PORT: "3000"
      # Defaults to development so a local `docker compose up` boots on http with
      # no extra config. Set NODE_ENV=production (+ ALLOWED_ORIGIN) in .env for the
      # production profile.
      NODE_ENV: ${NODE_ENV:-development}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env  (openssl rand -hex 32)}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@openboard.local}
      ORG_NAME: ${ORG_NAME:-My Organization}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_INTEGRATIONS_ANTHROPIC_API_KEY: ${AI_INTEGRATIONS_ANTHROPIC_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-opus-4-8}
      AI_LIGHT_MODEL: ${AI_LIGHT_MODEL:-claude-haiku-4-5-20251001}
      DEMO_MODE: ${DEMO_MODE:-}
      SEED_PASSWORD: ${SEED_PASSWORD:-}
    volumes:
      - uploads:/app/uploads
    # Bind to loopback by default (M2). The turnkey `docker compose up` stays
    # reachable at http://localhost:${APP_PORT} on the host; the production
    # profile's Caddy reaches the app as `app:3000` over the compose network, so
    # the host port never needs a public bind. To expose the app directly (no
    # reverse proxy), set APP_BIND=0.0.0.0 in .env.
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/api/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # Reverse proxy with automatic HTTPS. Only runs with `--profile production`.
  caddy:
    image: caddy:2
    restart: unless-stopped
    profiles: ["production"]
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    # DOMAIN must be set in .env for this (production) profile — Caddy needs it to
    # get a certificate. Not using `:?` here because Compose interpolates every
    # service (even profiled ones), which would break a plain `docker compose up`.
    environment:
      DOMAIN: ${DOMAIN:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  uploads:
  caddy-data:
  caddy-config:
